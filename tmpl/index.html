<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HANGMAN WEB</title>
    <link rel="stylesheet" href="./static/home.css" />
    <link rel="sortcut icon" href="./img/logo.png" />
  </head>

  <body>
    <header>
      <div class="icone">
        <a href="/home">
          <img src="./img/icone.jpg" alt="icone" height="75" />
        </a>
      </div>

      <div>
        <ul class="navbar">
          <li class="nav-item">
            <a href="/game">play</a>
          </li>
          <li class="nav-item">
            <a href="/leaderboard">leaderboard</a>
          </li>
          <li class="nav-item">
            <a href="/rules">how to play ?</a>
          </li>
        </ul>
      </div>

      <div class="icone">
        <a href="/profil">
          <img src="./img/icone-profil.png" alt="icone" height="50" />
        </a>
      </div>
    </header>

    <br />
    <div class="title">
      <h1>GAME</h1>
    </div>
    <br />
    <hr />
    <br />

    <div class="attemps">
        <p>Attemps left : {{ .AttemptLeft }}</p>
    </div>

    <div class="main">
        <div class="menu">
            <h1 class="word">{{ .WordGuessed }}</h1>
            <form action="/game3" method="post">
                <div class="search">
                    <input required type="text" name ="field2" placeholder="Let's try . . ." required>
                </div>
            </form>
        </div>
        <div class="hangman">
            <p><pre>{{ .Hangman }}</pre></p>
            {{range .Rep}} 
                {{.}} 
            {{end}}
        </div>
    </div>

    <footer>
      <div class="mentions">
        <a href="#">Condition Général</a>
      </div>
      <div class="copyrights">
        <a>Copyright</a>
      </div>
      <div class="contact">
        <a>Contact</a>
      </div>
    </footer>
  </body>
</html>
